<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="reMarkable Toolkit" font-family="'SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif">
  <title>reMarkable Toolkit</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1526"/>
      <stop offset="1" stop-color="#172339"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfaf5"/>
      <stop offset="1" stop-color="#efece1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="300" rx="22" fill="url(#bg)"/>
  <circle cx="1015" cy="35" r="265" fill="url(#glow)"/>

  <!-- e-ink tablet -->
  <g>
    <rect x="80" y="40" width="184" height="222" rx="18" fill="#0a1120" stroke="#33425c" stroke-width="2"/>
    <rect x="94" y="54" width="156" height="194" rx="7" fill="url(#screen)"/>
    <rect x="108" y="70" width="96" height="10" rx="3" fill="#0b3d5c"/>
    <rect x="108" y="92" width="128" height="5" rx="2.5" fill="#9aa7b8"/>
    <rect x="108" y="105" width="116" height="5" rx="2.5" fill="#9aa7b8"/>
    <rect x="108" y="118" width="104" height="5" rx="2.5" fill="#9aa7b8"/>
    <rect x="108" y="135" width="128" height="40" rx="5" fill="#eaeff3" stroke="#cfdae3"/>
    <rect x="116" y="143" width="58" height="4.5" rx="2" fill="#c0683a"/>
    <rect x="116" y="152" width="86" height="4.5" rx="2" fill="#0b66c2"/>
    <rect x="116" y="161" width="46" height="4.5" rx="2" fill="#2e7d32"/>
    <path d="M110 200 c 12 -16 26 4 38 -5 s 24 -12 36 -1 s 22 12 34 1" fill="none" stroke="#f0a832" stroke-width="3.2" stroke-linecap="round"/>
    <circle cx="216" cy="196" r="3.4" fill="#f0a832"/>
  </g>

  <!-- title -->
  <text x="360" y="120" font-size="54" font-weight="800" fill="#f7f9fc">reMarkable Toolkit</text>
  <rect x="362" y="136" width="116" height="4" rx="2" fill="#38bdf8"/>
  <text x="362" y="174" font-size="21" fill="#9fb2c7">Send anything to your tablet — pull everything back.</text>

  <!-- chips -->
  <g font-size="15" fill="#bfe0f5" text-anchor="middle">
    <rect x="362" y="200" width="78" height="28" rx="14" fill="#13243a" stroke="#2f4a66"/><text x="401" y="219">macOS</text>
    <rect x="450" y="200" width="70" height="28" rx="14" fill="#13243a" stroke="#2f4a66"/><text x="485" y="219">Linux</text>
    <rect x="530" y="200" width="76" height="28" rx="14" fill="#13243a" stroke="#2f4a66"/><text x="568" y="219">rmapi</text>
    <rect x="616" y="200" width="86" height="28" rx="14" fill="#13243a" stroke="#2f4a66"/><text x="659" y="219">Chrome</text>
    <rect x="712" y="200" width="94" height="28" rx="14" fill="#13243a" stroke="#2f4a66"/><text x="759" y="219">rmscene</text>
  </g>
</svg>
