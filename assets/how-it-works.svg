<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="How it works" font-family="'SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif">
  <title>How it works — send and pull pipelines</title>
  <defs>
    <marker id="aS" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0b66c2"/></marker>
    <marker id="aP" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c0683a"/></marker>
  </defs>

  <rect x="0" y="0" width="1200" height="360" rx="18" fill="#f6f4ee" stroke="#e4dfd2"/>

  <!-- ===== SEND ===== -->
  <path d="M70 48 l12 7 l-12 7 z" fill="#0b66c2"/>
  <text x="92" y="60" font-size="18" font-weight="800" fill="#0b66c2" letter-spacing="1.5">SEND</text>

  <g font-size="14.5">
    <!-- shadows -->
    <rect x="73" y="76" width="176" height="66" rx="11" fill="#000" opacity="0.05"/>
    <rect x="290" y="76" width="176" height="66" rx="11" fill="#000" opacity="0.05"/>
    <rect x="507" y="76" width="176" height="66" rx="11" fill="#000" opacity="0.05"/>
    <rect x="724" y="76" width="176" height="66" rx="11" fill="#000" opacity="0.05"/>
    <rect x="941" y="76" width="176" height="66" rx="11" fill="#000" opacity="0.05"/>
    <!-- boxes -->
    <rect x="70" y="72" width="176" height="66" rx="11" fill="#ffffff" stroke="#0b66c2" stroke-width="1.6"/>
    <rect x="287" y="72" width="176" height="66" rx="11" fill="#ffffff" stroke="#0b66c2" stroke-width="1.6"/>
    <rect x="504" y="72" width="176" height="66" rx="11" fill="#ffffff" stroke="#0b66c2" stroke-width="1.6"/>
    <rect x="721" y="72" width="176" height="66" rx="11" fill="#eef6ff" stroke="#0b66c2" stroke-width="1.6"/>
    <rect x="938" y="72" width="176" height="66" rx="11" fill="#e7f1ff" stroke="#0b66c2" stroke-width="1.6"/>
    <!-- labels -->
    <text x="158" y="100" text-anchor="middle" font-weight="700" fill="#1f2937">Markdown · URL</text>
    <text x="158" y="120" text-anchor="middle" font-size="13" fill="#5b6b7d">PDF · EPUB</text>
    <text x="375" y="100" text-anchor="middle" font-weight="700" fill="#1f2937">Convert</text>
    <text x="375" y="120" text-anchor="middle" font-size="13" fill="#5b6b7d">HTML → PDF</text>
    <text x="592" y="100" text-anchor="middle" font-weight="700" fill="#1f2937">rmapi put</text>
    <text x="592" y="120" text-anchor="middle" font-size="13" fill="#5b6b7d">sync 15</text>
    <text x="809" y="100" text-anchor="middle" font-weight="700" fill="#1f2937">reMarkable</text>
    <text x="809" y="120" text-anchor="middle" font-size="13" fill="#5b6b7d">Cloud</text>
    <text x="1026" y="100" text-anchor="middle" font-weight="700" fill="#1f2937">Your tablet</text>
    <text x="1026" y="120" text-anchor="middle" font-size="13" fill="#5b6b7d">it syncs ✓</text>
    <!-- arrows -->
    <line x1="249" y1="105" x2="284" y2="105" stroke="#0b66c2" stroke-width="2.2" marker-end="url(#aS)"/>
    <line x1="466" y1="105" x2="501" y2="105" stroke="#0b66c2" stroke-width="2.2" marker-end="url(#aS)"/>
    <line x1="683" y1="105" x2="718" y2="105" stroke="#0b66c2" stroke-width="2.2" marker-end="url(#aS)"/>
    <line x1="900" y1="105" x2="935" y2="105" stroke="#0b66c2" stroke-width="2.2" marker-end="url(#aS)"/>
  </g>

  <!-- ===== PULL ===== -->
  <path d="M82 228 l-12 7 l12 7 z" fill="#c0683a"/>
  <text x="92" y="240" font-size="18" font-weight="800" fill="#c0683a" letter-spacing="1.5">PULL</text>

  <g font-size="14.5">
    <rect x="73" y="256" width="176" height="66" rx="11" fill="#000" opacity="0.05"/>
    <rect x="290" y="256" width="176" height="66" rx="11" fill="#000" opacity="0.05"/>
    <rect x="507" y="256" width="176" height="66" rx="11" fill="#000" opacity="0.05"/>
    <rect x="724" y="256" width="176" height="66" rx="11" fill="#000" opacity="0.05"/>
    <rect x="941" y="256" width="176" height="66" rx="11" fill="#000" opacity="0.05"/>
    <rect x="70" y="252" width="176" height="66" rx="11" fill="#fdf0e8" stroke="#c0683a" stroke-width="1.6"/>
    <rect x="287" y="252" width="176" height="66" rx="11" fill="#fdf3ec" stroke="#c0683a" stroke-width="1.6"/>
    <rect x="504" y="252" width="176" height="66" rx="11" fill="#ffffff" stroke="#c0683a" stroke-width="1.6"/>
    <rect x="721" y="252" width="176" height="66" rx="11" fill="#ffffff" stroke="#c0683a" stroke-width="1.6"/>
    <rect x="938" y="252" width="176" height="66" rx="11" fill="#ffffff" stroke="#c0683a" stroke-width="1.6"/>
    <text x="158" y="280" text-anchor="middle" font-weight="700" fill="#1f2937">Your tablet</text>
    <text x="158" y="300" text-anchor="middle" font-size="13" fill="#5b6b7d">notes &amp; docs</text>
    <text x="375" y="280" text-anchor="middle" font-weight="700" fill="#1f2937">reMarkable</text>
    <text x="375" y="300" text-anchor="middle" font-size="13" fill="#5b6b7d">Cloud</text>
    <text x="592" y="280" text-anchor="middle" font-weight="700" fill="#1f2937">rmapi get</text>
    <text x="592" y="300" text-anchor="middle" font-size="13" fill="#5b6b7d">/ mget backup</text>
    <text x="809" y="280" text-anchor="middle" font-weight="700" fill="#1f2937">rmscene</text>
    <text x="809" y="300" text-anchor="middle" font-size="13" fill="#5b6b7d">render</text>
    <text x="1026" y="280" text-anchor="middle" font-weight="700" fill="#1f2937">PDF</text>
    <text x="1026" y="300" text-anchor="middle" font-size="13" fill="#5b6b7d">/ backup</text>
    <line x1="249" y1="285" x2="284" y2="285" stroke="#c0683a" stroke-width="2.2" marker-end="url(#aP)"/>
    <line x1="466" y1="285" x2="501" y2="285" stroke="#c0683a" stroke-width="2.2" marker-end="url(#aP)"/>
    <line x1="683" y1="285" x2="718" y2="285" stroke="#c0683a" stroke-width="2.2" marker-end="url(#aP)"/>
    <line x1="900" y1="285" x2="935" y2="285" stroke="#c0683a" stroke-width="2.2" marker-end="url(#aP)"/>
  </g>
</svg>
